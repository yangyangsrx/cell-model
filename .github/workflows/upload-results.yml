name: Upload cell model results

on:
  workflow_dispatch:
  push:
    paths:
      - "cell_*.npy"
      - "cell_*.tif"
      - "cell_results_slices.png"
      - ".github/workflows/upload-results.yml"

jobs:
  upload-results:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload result files
        uses: actions/upload-artifact@v4
        with:
          name: cell-model-results
          path: |
            cell_density.tif
            cell_density_gcm3.npy
            cell_labels.npy
            cell_labels.tif
            cell_mu_520eV.tif
            cell_mu_520eV_uminv.npy
            cell_projection_0deg.npy
            cell_results_slices.png
            cell_sinogram.npy
          if-no-files-found: error
          compression-level: 0
